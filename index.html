<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEEX - Sistema Contable</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--cyan:#00b4d8;--green:#90e0a0;--red:#f87171;--yellow:#fbbf24;--accent:#0ea5e9}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#0d2137 0%,#0d1117 70%)}
.loginBox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px;box-shadow:0 0 40px rgba(0,180,216,.1)}
.loginLogo{text-align:center;margin-bottom:28px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;outline:none}
.fg input:focus{border-color:var(--cyan)}
.btnLogin{width:100%;background:linear-gradient(135deg,#0ea5e9,#00b4d8);color:#fff;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px}
.errMsg{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none}
.loginHint{font-size:11px;color:var(--text2);text-align:center;margin-top:12px}
#app{display:none}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
.sbLogo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sbNav{flex:1;padding:10px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:var(--text2);font-size:13px;border-left:3px solid transparent;transition:all .15s}
.ni:hover{color:var(--text);background:var(--bg3)}
.ni.active{color:var(--cyan);background:rgba(0,180,216,.08);border-left-color:var(--cyan)}
.ni svg{width:16px;height:16px;flex-shrink:0}
.sbFoot{padding:10px 14px;border-top:1px solid var(--border)}
.ubadge{display:flex;align-items:center;gap:8px;margin-top:8px}
.uav{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--accent));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.lout{margin-left:auto;cursor:pointer;color:var(--text2);font-size:11px}
.lout:hover{color:var(--red)}
.main{margin-left:220px;padding:24px;min-height:100vh}
.pageTitle{font-size:20px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px}
.card .lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card .val{font-size:22px;font-weight:700}
.card .sub{font-size:11px;color:var(--text2);margin-top:3px}
.green{color:var(--green)}.red{color:var(--red)}.cyan{color:var(--cyan)}.yellow{color:var(--yellow)}
.twrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px}
.thead2{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.thead2 h3{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:9px 14px;text-align:left}
td{padding:9px 14px;font-size:13px;border-top:1px solid var(--border)}
tr:hover td{background:rgba(255,255,255,.02)}
.trow td{font-weight:700;background:var(--bg3);border-top:2px solid var(--border)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:rgba(144,224,160,.15);color:var(--green)}
.br{background:rgba(248,113,113,.15);color:var(--red)}
.by{background:rgba(251,191,36,.15);color:var(--yellow)}
.bb{background:rgba(14,165,233,.15);color:var(--cyan)}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px}
.panel h3{font-size:14px;font-weight:600;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.f label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.f input,.f select,.f textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:8px;font-size:13px;outline:none;font-family:inherit}
.f input:focus,.f select:focus{border-color:var(--cyan)}
.f select option{background:var(--bg3)}
.factions{display:flex;gap:10px;margin-top:16px}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .2s}
.btn:hover{opacity:.85}
.bp{background:linear-gradient(135deg,#0ea5e9,#00b4d8);color:#fff}
.bs{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.bd{background:rgba(248,113,113,.2);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.sm{padding:5px 10px;font-size:11px}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
.aok{background:rgba(144,224,160,.1);border:1px solid rgba(144,224,160,.3);color:var(--green)}
.ainfo{background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.3);color:var(--cyan)}
.aerr{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.aline{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 28px;gap:8px;align-items:center;margin-bottom:7px}
.aline input,.aline select{padding:6px 9px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:12px;width:100%}
.rlbtn{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px}
.blbl{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 28px;gap:8px;margin-bottom:4px}
.blbl span{font-size:11px;color:var(--text2)}
.bcheck{font-size:12px;padding:5px 10px;border-radius:6px;display:inline-block;margin-top:6px}
.bok{background:rgba(144,224,160,.1);color:var(--green)}
.berr{background:rgba(248,113,113,.1);color:var(--red)}
.loading{display:flex;align-items:center;gap:10px;color:var(--text2);font-size:13px;padding:20px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="loginBox">
    <div class="loginLogo">
      <svg viewBox="0 0 280 90" width="180" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 14 L40 48 L10 82" stroke="#00b4d8" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M52 14 L22 48 L52 82" stroke="#8cc63f" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="68" y="68" font-family="'Segoe UI',Arial,sans-serif" font-size="50" font-weight="800" fill="#1a3a5c" letter-spacing="3">LEEX</text>
      </svg>
    </div>
    <div class="fg"><label>Usuario</label><input type="text" id="lu" placeholder="usuario"/></div>
    <div class="fg"><label>Contraseña</label><input type="password" id="lp" placeholder="contraseña" onkeydown="if(event.key==='Enter')login()"/></div>
    <button class="btnLogin" onclick="login()">Ingresar</button>
    <div class="errMsg" id="lerr">Usuario o contraseña incorrectos</div>
    <div class="loginHint">Usuario: <b>leex</b> &nbsp;|&nbsp; Contraseña: <b>2026</b></div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sbLogo">
      <svg viewBox="0 0 280 90" width="130" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 14 L40 48 L10 82" stroke="#00b4d8" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M52 14 L22 48 L52 82" stroke="#8cc63f" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="68" y="68" font-family="'Segoe UI',Arial,sans-serif" font-size="50" font-weight="800" fill="#e6edf3" letter-spacing="3">LEEX</text>
      </svg>
    </div>
    <nav class="sbNav">
      <div class="ni active" onclick="go('dashboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</div>
      <div class="ni" onclick="go('gastos')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Registro de Gastos</div>
      <div class="ni" onclick="go('asientos')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>Asientos Contables</div>
      <div class="ni" onclick="go('banco')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Conciliación Bancaria</div>
      <div class="ni" onclick="go('balance')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Balance Contable</div>
      <div class="ni" onclick="go('resultados')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Estado de Resultados</div>
      <div class="ni" onclick="go('proyectos')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Proyectos</div>
      <div class="ni" onclick="go('cuentas')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>Plan de Cuentas</div>
      <div class="ni" id="niAdmin" onclick="go('usuarios')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Usuarios</div>
    </nav>
    <div class="sbFoot">
      <div class="ubadge">
        <div class="uav" id="uav">AD</div>
        <div><div id="uname" style="font-size:12px;font-weight:600">Admin</div><div id="urole" style="font-size:10px;color:var(--cyan)">Administrador</div></div>
        <div class="lout" onclick="logout()">✕</div>
      </div>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
// ===== CONFIG SUPABASE =====
var SB_URL = 'https://metirtnwksooxukzqoti.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ldGlydG53a3Nvb3h1a3pxb3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwMTQsImV4cCI6MjA5MjI4NTAxNH0.AP0FRv8AyCWILlcbCa8aCpcp155CL0QwflYqDn5mrB0';

// ===== API SUPABASE =====
function sbHeaders() {
  return {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
}
function sbGet(table, params) {
  var url = SB_URL+'/rest/v1/'+table+'?'+(params||'');
  return fetch(url,{headers:sbHeaders()}).then(function(r){return r.json();});
}
function sbPost(table, body) {
  return fetch(SB_URL+'/rest/v1/'+table,{
    method:'POST', headers:Object.assign({'Prefer':'return=representation'},sbHeaders()),
    body:JSON.stringify(body)
  }).then(function(r){return r.json();});
}
function sbPatch(table, id, body) {
  return fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id,{
    method:'PATCH', headers:Object.assign({'Prefer':'return=representation'},sbHeaders()),
    body:JSON.stringify(body)
  }).then(function(r){return r.json();});
}
function sbDelete(table, id) {
  return fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id,{
    method:'DELETE', headers:sbHeaders()
  });
}

// ===== USUARIOS (locales — no en Supabase) =====
var USERS = [
  {id:1,u:'leex',p:'2026',name:'Administrador',role:'admin',ini:'AD'},
  {id:2,u:'lector1',p:'leex123',name:'Lectura 1',role:'reader',ini:'L1'},
  {id:3,u:'lector2',p:'leex456',name:'Lectura 2',role:'reader',ini:'L2'}
];
var CU = null;

// ===== CACHE LOCAL (para renders) =====
var C = {
  config:{saldo_inicial_banco:12453.05, banco_nombre:'International Finance Bank', banco_cuenta:'001-LEEX-2026'},
  proyectos:[], cuentas:[], gastos:[], asientos:[], lineas:[], movs:[]
};

// ===== ESTADO UI =====
var asientoTab='libro', mayorCuenta='', aBusca='', pendingAsiento=null, selProy='', alineCount=0;
var gFiltros={desde:'',hasta:'',proy:'',cuenta:''};

// ===== AUTH =====
function login() {
  var u=document.getElementById('lu').value.trim().toLowerCase();
  var p=document.getElementById('lp').value.trim();
  var user=null;
  for(var i=0;i<USERS.length;i++){if(USERS[i].u===u&&USERS[i].p===p){user=USERS[i];break;}}
  if(!user){document.getElementById('lerr').style.display='block';return;}
  document.getElementById('lerr').style.display='none';
  CU=user;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('uav').textContent=user.ini;
  document.getElementById('uname').textContent=user.name;
  document.getElementById('urole').textContent=user.role==='admin'?'Administrador':'Solo Lectura';
  if(user.role!=='admin') document.getElementById('niAdmin').style.display='none';
  loadAll().then(function(){go('dashboard');});
}
function logout(){
  CU=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('lu').value='';
  document.getElementById('lp').value='';
}
function isAdmin(){return CU&&CU.role==='admin';}

// ===== CARGA INICIAL DESDE SUPABASE =====
function loadAll() {
  document.getElementById('main').innerHTML='<div class="loading"><div class="spinner"></div>Cargando datos desde la nube...</div>';
  return Promise.all([
    sbGet('configuracion','select=clave,valor'),
    sbGet('proyectos','select=*&order=id'),
    sbGet('cuentas','select=*&order=codigo'),
    sbGet('gastos','select=*&order=fecha'),
    sbGet('asientos','select=*&order=fecha'),
    sbGet('asiento_lineas','select=*&order=asiento_id'),
    sbGet('movimientos_banco','select=*&order=fecha')
  ]).then(function(res){
    // Config
    if(Array.isArray(res[0])) res[0].forEach(function(r){
      if(r.clave==='saldo_inicial_banco') C.config.saldo_inicial_banco=parseFloat(r.valor);
      if(r.clave==='banco_nombre') C.config.banco_nombre=r.valor;
      if(r.clave==='banco_cuenta') C.config.banco_cuenta=r.valor;
    });
    C.proyectos  = Array.isArray(res[1])?res[1]:[];
    C.cuentas    = Array.isArray(res[2])?res[2]:[];
    C.gastos     = Array.isArray(res[3])?res[3]:[];
    C.asientos   = Array.isArray(res[4])?res[4]:[];
    C.lineas     = Array.isArray(res[5])?res[5]:[];
    C.movs       = Array.isArray(res[6])?res[6]:[];
  }).catch(function(e){
    document.getElementById('main').innerHTML='<div class="alert aerr">Error conectando con Supabase: '+e.message+'</div>';
  });
}

// ===== NAV =====
function go(page) {
  document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('active');});
  var map={dashboard:0,gastos:1,asientos:2,banco:3,balance:4,resultados:5,proyectos:6,cuentas:7,usuarios:8};
  var items=document.querySelectorAll('.ni');
  if(map[page]!==undefined&&items[map[page]]) items[map[page]].classList.add('active');
  var pages={dashboard:pgDashboard,gastos:pgGastos,asientos:pgAsientos,banco:pgBanco,balance:pgBalance,resultados:pgResultados,proyectos:pgProyectos,cuentas:pgCuentas,usuarios:pgUsuarios};
  document.getElementById('main').innerHTML=pages[page]?pages[page]():'<p>En construcción</p>';
}
function reload(page){
  document.getElementById('main').innerHTML='<div class="loading"><div class="spinner"></div>Actualizando...</div>';
  loadAll().then(function(){go(page);});
}

// ===== HELPERS =====
function fmt(v){return '$'+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtD(d){return d?d.split('-').reverse().join('/'):'';}
function getCta(cod){for(var i=0;i<C.cuentas.length;i++)if(C.cuentas[i].codigo===cod)return C.cuentas[i];return null;}
function getProy(id){for(var i=0;i<C.proyectos.length;i++)if(C.proyectos[i].id==id)return C.proyectos[i];return null;}
function saldoBanco(){var s=C.config.saldo_inicial_banco;for(var i=0;i<C.movs.length;i++)s+=parseFloat(C.movs[i].monto);return s;}
function totalGastos(){var s=0;for(var i=0;i<C.gastos.length;i++)s+=parseFloat(C.gastos[i].monto);return s;}
function lineasDeAsiento(aid){return C.lineas.filter(function(l){return l.asiento_id===aid;});}
function ctasOpts(sel){var h='';for(var i=0;i<C.cuentas.length;i++){var c=C.cuentas[i];h+='<option value="'+c.codigo+'"'+(c.codigo===sel?' selected':'')+'>'+c.codigo+' - '+c.nombre+'</option>';}return h;}
function proyOpts(sel){var h='';for(var i=0;i<C.proyectos.length;i++){var p=C.proyectos[i];h+='<option value="'+p.id+'"'+(p.id==sel?' selected':'')+'>'+p.nombre+'</option>';}return h;}
function spinner(){return '<div class="loading"><div class="spinner"></div>Guardando...</div>';}

// ===== DASHBOARD =====
function pgDashboard(){
  var ing=0;
  C.lineas.forEach(function(l){var a=C.asientos.find(function(a){return a.id===l.asiento_id;});if(!a)return;var c=getCta(l.cuenta_codigo);if(c&&c.tipo==='Ingreso')ing+=parseFloat(l.haber)-parseFloat(l.debe);});
  var gas=totalGastos(),sb=saldoBanco(),res=ing-gas;
  var pend=C.movs.filter(function(m){return !m.conciliado;}).length;
  var recientes='';
  C.gastos.slice().reverse().slice(0,5).forEach(function(g){var p=getProy(g.proyecto_id);recientes+='<tr><td>'+fmtD(g.fecha)+'</td><td>'+g.descripcion+'</td><td>'+(p?p.nombre:'-')+'</td><td class="red">'+fmt(g.monto)+'</td></tr>';});
  return '<div class="pageTitle">Dashboard — Ejercicio 2026</div>'+
    '<div class="cards">'+
    '<div class="card"><div class="lbl">Ingresos</div><div class="val green">'+fmt(ing)+'</div><div class="sub">USD</div></div>'+
    '<div class="card"><div class="lbl">Gastos</div><div class="val red">'+fmt(gas)+'</div><div class="sub">USD</div></div>'+
    '<div class="card"><div class="lbl">Resultado Neto</div><div class="val '+(res>=0?'cyan':'red')+'">'+fmt(res)+'</div><div class="sub">USD</div></div>'+
    '<div class="card"><div class="lbl">Saldo Bancario</div><div class="val cyan">'+fmt(sb)+'</div><div class="sub">'+C.config.banco_nombre+'</div></div>'+
    '<div class="card"><div class="lbl">Sin Conciliar</div><div class="val yellow">'+pend+'</div><div class="sub">movimientos</div></div>'+
    '<div class="card"><div class="lbl">Asientos</div><div class="val">'+C.asientos.length+'</div><div class="sub">registrados</div></div>'+
    '</div>'+
    '<div class="twrap"><div class="thead2"><h3>Últimos Gastos</h3></div>'+
    '<table><thead><tr><th>Fecha</th><th>Descripción</th><th>Proyecto</th><th>Monto</th></tr></thead><tbody>'+
    (recientes||'<tr><td colspan="4" style="text-align:center;color:var(--text2);padding:20px">Sin gastos</td></tr>')+
    '</tbody></table></div>';
}

// ===== GASTOS =====
function pgGastos(){
  var ro=!isAdmin();
  var fil=C.gastos.filter(function(g){
    if(gFiltros.desde&&g.fecha<gFiltros.desde)return false;
    if(gFiltros.hasta&&g.fecha>gFiltros.hasta)return false;

function addLine(){
  alineCount++;var id=alineCount;
  var div=document.createElement('div');div.className='aline';div.id='al'+id;
  div.innerHTML='<select onchange="chkBal()"><option value="">-- Cuenta --</option>'+ctasOpts('')+'</select>'+
    '<input type="text" placeholder="Detalle"/>'+
    '<input type="number" placeholder="Debe" min="0" step="0.01" oninput="chkBal()"/>'+
    '<input type="number" placeholder="Haber" min="0" step="0.01" oninput="chkBal()"/>'+
    '<button class="rlbtn" onclick="document.getElementById(\'al'+id+'\').remove();chkBal()">✕</button>';
  document.getElementById('alines').appendChild(div);chkBal();
}
function getLines(){
  var rows=document.querySelectorAll('#alines .aline'),res=[];
  for(var i=0;i<rows.length;i++){
    var r=rows[i],ins=r.querySelectorAll('input');
    res.push({cuenta:r.querySelector('select').value,det:ins[0].value,debe:parseFloat(ins[1].value)||0,haber:parseFloat(ins[2].value)||0});
  }
  return res;
}
function chkBal(){
  var ls=getLines(),d=0,h=0;
  ls.forEach(function(l){d+=l.debe;h+=l.haber;});
  var el=document.getElementById('bchk');if(!el)return;
  if(Math.abs(d-h)<0.001&&d>0){el.className='bcheck bok';el.textContent='✓ Balanceado: '+fmt(d);}
  else{el.className='bcheck berr';el.textContent='✗ Debe '+fmt(d)+' ≠ Haber '+fmt(h);}
}
function saveAsiento(){
  var f=document.getElementById('aF').value,d=document.getElementById('aD').value.trim(),r=document.getElementById('aR').value.trim();
  var movId=document.getElementById('aPendMovId').value;
  var ls=getLines(),db=0,hb=0;
  ls.forEach(function(l){db+=l.debe;hb+=l.haber;});
  if(!f||!d){alert('Completá fecha y descripción.');return;}
  if(ls.length<2){alert('Mínimo 2 líneas.');return;}
  if(Math.abs(db-hb)>0.001){alert('No balanceado. Debe='+fmt(db)+' Haber='+fmt(hb));return;}
  var origen=movId?'banco':'manual';
  // 1. Guardar cabecera
  sbPost('asientos',{fecha:f,descripcion:d,referencia:r||'AST-pendiente',origen:origen}).then(function(res){
    var ast=Array.isArray(res)?res[0]:res;
    if(!ast||!ast.id){alert('Error guardando asiento.');return;}
    var astId=ast.id;
    // Actualizar referencia con ID real
    var ref=r||'AST-'+String(astId).padStart(3,'0');
    sbPatch('asientos',astId,{referencia:ref});
    // 2. Guardar líneas
    var lineasBody=ls.map(function(l){return {asiento_id:astId,cuenta_codigo:l.cuenta,detalle:l.det,debe:l.debe,haber:l.haber};});
    sbPost('asiento_lineas',lineasBody).then(function(){
      // 3. Vincular movimiento bancario si corresponde
      if(movId){
        sbPatch('movimientos_banco',movId,{asiento_id:astId}).then(function(){
          pendingAsiento=null;alineCount=0;asientoTab='libro';reload('asientos');
        });
      } else {
        pendingAsiento=null;alineCount=0;asientoTab='libro';reload('asientos');
      }
    });
  });
}
function genAsiento(id){
  var m=C.movs.find(function(x){return x.id===id;});
  if(!m)return;
  asientoTab='nuevo';
  pendingAsiento={
    fecha:m.fecha,desc:m.descripcion,
    ref:'AST-nuevo',movId:m.id,
    lineas:parseFloat(m.monto)>0
      ?[{cuenta:'1.1.01',det:m.descripcion,debe:Math.abs(m.monto),haber:0},{cuenta:'4.1.01',det:m.descripcion,debe:0,haber:Math.abs(m.monto)}]
      :[{cuenta:'5.1.07',det:m.descripcion,debe:Math.abs(m.monto),haber:0},{cuenta:'1.1.01',det:m.descripcion,debe:0,haber:Math.abs(m.monto)}]
  };
  go('asientos');
}

function parseCSV(txt){
  var sep=txt.indexOf(';')>-1?';':',';
  var lines=txt.trim().split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2)return[];
  function splitL(line){var res=[],cur='',inq=false;for(var i=0;i<line.length;i++){if(line[i]==='"'){inq=!inq;}else if(line[i]===sep&&!inq){res.push(cur.trim().replace(/^"|"$/g,''));cur='';}else cur+=line[i];}res.push(cur.trim().replace(/^"|"$/g,''));return res;}
  var hdr=splitL(lines[0]).map(function(h){return h.toLowerCase().trim();});
  function gi(names){for(var i=0;i<names.length;i++){var x=hdr.indexOf(names[i]);if(x>-1)return x;}return -1;}
  var iDate=gi(['processed date','date','fecha']);
  var iDesc=gi(['description','descripcion','descripción','concepto']);
  var iCOD=gi(['credit or debit','tipo']);
  var iAmt=gi(['amount','monto','importe']);
  var iDebe=gi(['debe','débito','debito']);
  var iHaber=gi(['haber','crédito','credito']);
  function normF(f){f=f.trim();if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(f)){var p=f.split('/');return p[2]+'-'+p[0].padStart(2,'0')+'-'+p[1].padStart(2,'0');}if(/^\d{4}-\d{2}-\d{2}/.test(f))return f.slice(0,10);return f;}
  function pM(v){return parseFloat((v||'').replace(/[$,]/g,''))||0;}
  var res=[];
  for(var i=1;i<lines.length;i++){
    var c=splitL(lines[i]);if(c.length<2)continue;
    var fecha=normF(iDate>-1?c[iDate]:'');if(!fecha)continue;
    var desc=(iDesc>-1?c[iDesc]:'')||'Sin descripción';
    var monto=0;
    if(iCOD>-1&&iAmt>-1){var cod=(c[iCOD]||'').toLowerCase();var amt=pM(c[iAmt]);monto=cod.indexOf('debit')>-1?-Math.abs(amt):Math.abs(amt);}
    else if(iDebe>-1&&iHaber>-1){monto=pM(c[iHaber])-pM(c[iDebe]);}
    else if(iAmt>-1){monto=pM(c[iAmt]);}
    if(monto===0)continue;
    res.push({fecha:fecha,desc:desc,monto:monto});
  }
  return res;
}
function showCSVPrev(rows,nombre){
  if(rows.length===0){document.getElementById('csvPrev').innerHTML='<div class="alert aerr" style="margin-top:12px">⚠ No se interpretaron filas.</div>';return;}

  var encoded=encodeURIComponent(JSON.stringify(rows));
  document.getElementById('csvPrev').innerHTML='<div style="margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden">'+
    '<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">'+
    '<span style="font-size:13px;font-weight:600">Vista previa: <span class="cyan">'+rows.length+' movimientos</span> · '+nombre+'</span>'+
    '<div style="display:flex;gap:10px"><span class="green" style="font-size:12px">+'+fmt(cr)+'</span><span class="red" style="font-size:12px">'+fmt(db)+'</span></div></div>'+
    '<div style="max-height:200px;overflow-y:auto"><table style="width:100%"><thead><tr>'+
    '<th style="padding:7px 10px;font-size:11px;background:var(--bg2)">Fecha</th><th style="padding:7px 10px;font-size:11px;background:var(--bg2)">Descripción</th>'+
    '<th style="padding:7px 10px;font-size:11px;background:var(--bg2)">Tipo</th><th style="padding:7px 10px;font-size:11px;background:var(--bg2)">Monto</th></tr></thead>'+
    '<tbody>'+trs+(rows.length>8?'<tr><td colspan="4" style="padding:7px 10px;font-size:12px;color:var(--text2);border-top:1px solid var(--border)">... y '+(rows.length-8)+' más</td></tr>':'')+'</tbody></table></div>'+
    '<div style="padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px">'+
    '<button class="btn bp" onclick="confirmCSV(\''+encoded+'\')">✓ Confirmar e Importar</button>'+
    '<button class="btn bs" onclick="document.getElementById(\'csvPrev\').innerHTML=\'\'">Cancelar</button></div></div>';
}

function confirmCSV(encoded){
  var rows=JSON.parse(decodeURIComponent(encoded));
  // Filtrar duplicados
  var nuevos=rows.filter(function(r){
    return !C.movs.find(function(m){return m.fecha===r.fecha&&m.descripcion===r.desc&&parseFloat(m.monto)===r.monto;});
  });
  if(nuevos.length===0){alert('Todos los movimientos ya existen.');return;}
  var body=nuevos.map(function(r){return {fecha:r.fecha,descripcion:r.desc,monto:r.monto,conciliado:false};});
  sbPost('movimientos_banco',body).then(function(){
    reload('banco');
    if(nuevos.length<rows.length) alert(nuevos.length+' importados, '+(rows.length-nuevos.length)+' duplicados omitidos.');
  });
}

function pgBalance(){
  function saldoCta(cod,tipo){
    var s=0;
    C.lineas.forEach(function(l){
      if(l.cuenta_codigo!==cod)return;
      s+=tipo==='Activo'?parseFloat(l.debe)-parseFloat(l.haber):parseFloat(l.haber)-parseFloat(l.debe);
    });
    return s;
  }
  function seccion(tipo){
    var rows='',tot=0;
    C.cuentas.forEach(function(c){
      if(c.tipo!==tipo)return;
      var s=saldoCta(c.codigo,tipo);if(s===0)return;
      tot+=s;rows+='<tr><td style="font-family:monospace">'+c.codigo+'</td><td>'+c.nombre+'</td><td>'+fmt(s)+'</td></tr>';
    });
    return {rows:rows,tot:tot};
  }
  var act=seccion('Activo'),pas=seccion('Pasivo'),pat=seccion('Patrimonio');
  var ok=Math.abs(act.tot-pas.tot-pat.tot)<1;

    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'+
    '<div class="twrap"><div class="thead2"><h3>ACTIVO</h3></div><table><thead><tr><th>Código</th><th>Cuenta</th><th>Saldo</th></tr></thead><tbody>'+

    '<tr class="trow"><td colspan="2">TOTAL ACTIVO</td><td class="green">'+fmt(act.tot)+'</td></tr></tbody></table></div>'+
    '<div>'+
    '<div class="twrap" style="margin-bottom:14px"><div class="thead2"><h3>PASIVO</h3></div><table><thead><tr><th>Código</th><th>Cuenta</th><th>Saldo</th></tr></thead><tbody>'+
    (pas.rows||'<tr><td colspan="3" style="text-align:center;color:var(--text2);padding:14px">Sin movimientos</td></tr>')+
    '<tr class="trow"><td colspan="2">TOTAL PASIVO</td><td class="red">'+fmt(pas.tot)+'</td></tr></tbody></table></div>'+
    '<div class="twrap"><div class="thead2"><h3>PATRIMONIO</h3></div><table><thead><tr><th>Código</th><th>Cuenta</th><th>Saldo</th></tr></thead><tbody>'+
