<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEEX - Sistema Contable</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--cyan:#00b4d8;--green:#90e0a0;--red:#f87171;--yellow:#fbbf24;--accent:#0ea5e9}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#0d2137 0%,#0d1117 70%)}
.loginBox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px}
.fg{margin-bottom:14px}.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;outline:none}
.fg input:focus{border-color:var(--cyan)}
.btnLogin{width:100%;background:linear-gradient(135deg,#0ea5e9,#00b4d8);color:#fff;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px}
.errMsg{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none}
.loginHint{font-size:11px;color:var(--text2);text-align:center;margin-top:12px}
#app{display:none}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:225px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sbLogo{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.sbSection{padding:6px 14px 2px;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-top:6px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;color:var(--text2);font-size:13px;border-left:3px solid transparent;transition:all .15s}
.ni:hover{color:var(--text);background:var(--bg3)}
.ni.active{color:var(--cyan);background:rgba(0,180,216,.08);border-left-color:var(--cyan)}
.ni svg{width:15px;height:15px;flex-shrink:0}
.sbFoot{padding:10px 14px;border-top:1px solid var(--border);margin-top:auto}
.ubadge{display:flex;align-items:center;gap:8px}
.uav{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--accent));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.lout{margin-left:auto;cursor:pointer;color:var(--text2);font-size:11px}.lout:hover{color:var(--red)}
.main{margin-left:225px;padding:22px;min-height:100vh}
.pageTitle{font-size:19px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:18px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.card .lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.card .val{font-size:20px;font-weight:700}.card .sub{font-size:11px;color:var(--text2);margin-top:3px}
.green{color:var(--green)}.red{color:var(--red)}.cyan{color:var(--cyan)}.yellow{color:var(--yellow)}
.twrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.thead2{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.thead2 h3{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;text-align:left;white-space:nowrap}
td{padding:8px 12px;font-size:12px;border-top:1px solid var(--border)}
tr:hover td{background:rgba(255,255,255,.02)}
.trow td{font-weight:700;background:var(--bg3);border-top:2px solid var(--border)}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:rgba(144,224,160,.15);color:var(--green)}.br{background:rgba(248,113,113,.15);color:var(--red)}
.by{background:rgba(251,191,36,.15);color:var(--yellow)}.bb{background:rgba(14,165,233,.15);color:var(--cyan)}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.panel h3{font-size:14px;font-weight:600;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.f label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px}
.f input,.f select,.f textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:7px;font-size:12px;outline:none;font-family:inherit}
.f input:focus,.f select:focus{border-color:var(--cyan)}.f select option{background:var(--bg3)}
.factions{display:flex;gap:8px;margin-top:14px}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:opacity .2s}
.btn:hover{opacity:.85}
.bp{background:linear-gradient(135deg,#0ea5e9,#00b4d8);color:#fff}
.bs{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.bd{background:rgba(248,113,113,.2);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.sm{padding:4px 9px;font-size:11px}
.alert{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:13px}
.aok{background:rgba(144,224,160,.1);border:1px solid rgba(144,224,160,.3);color:var(--green)}
.ainfo{background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.3);color:var(--cyan)}
.aerr{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.aline{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 28px;gap:7px;align-items:center;margin-bottom:6px}
.aline input,.aline select{padding:5px 8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:12px;width:100%}
.rlbtn{background:none;border:none;color:var(--red);cursor:pointer;font-size:15px}
.blbl{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 28px;gap:7px;margin-bottom:4px}
.blbl span{font-size:11px;color:var(--text2)}
.bcheck{font-size:12px;padding:4px 9px;border-radius:6px;display:inline-block;margin-top:5px}
.bok{background:rgba(144,224,160,.1);color:var(--green)}.berr{background:rgba(248,113,113,.1);color:var(--red)}
.loading{display:flex;align-items:center;gap:10px;color:var(--text2);font-size:13px;padding:20px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:7px;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s}
.tab.active{background:var(--bg3);color:var(--text)}
.divider{height:1px;background:var(--border);margin:6px 14px}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="loginBox">
    <div style="text-align:center;margin-bottom:24px">
      <svg viewBox="0 0 280 90" width="170" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 14 L40 48 L10 82" stroke="#00b4d8" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M52 14 L22 48 L52 82" stroke="#8cc63f" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="68" y="68" font-family="'Segoe UI',Arial,sans-serif" font-size="50" font-weight="800" fill="#1a3a5c" letter-spacing="3">LEEX</text>
      </svg>
    </div>
    <div class="fg"><label>Usuario</label><input type="text" id="lu" placeholder="usuario"/></div>
    <div class="fg"><label>Contraseña</label><input type="password" id="lp" placeholder="contraseña" onkeydown="if(event.key==='Enter')login()"/></div>
    <button class="btnLogin" onclick="login()">Ingresar</button>
    <div class="errMsg" id="lerr">Usuario o contraseña incorrectos</div>
    <div class="loginHint">Usuario: <b>leex</b> &nbsp;|&nbsp; Contraseña: <b>2026</b></div>
  </div>
</div>
<div id="app">
  <div class="sidebar">
    <div class="sbLogo">
      <svg viewBox="0 0 280 90" width="120" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 14 L40 48 L10 82" stroke="#00b4d8" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M52 14 L22 48 L52 82" stroke="#8cc63f" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="68" y="68" font-family="'Segoe UI',Arial,sans-serif" font-size="50" font-weight="800" fill="#e6edf3" letter-spacing="3">LEEX</text>
      </svg>
    </div>
    <div class="sbSection">Contabilidad</div>
    <div class="ni active" onclick="go('dashboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</div>
    <div class="ni" onclick="go('gastos')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Registro de Gastos</div>
    <div class="ni" onclick="go('asientos')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>Asientos Contables</div>
    <div class="ni" onclick="go('banco')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Conciliación Bancaria</div>
    <div class="ni" onclick="go('balance')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Balance Contable</div>
    <div class="ni" onclick="go('resultados')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Estado de Resultados</div>
    <div class="ni" onclick="go('cuentas')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>Plan de Cuentas</div>
    <div class="divider"></div>
    <div class="sbSection">Proyectos</div>
    <div class="ni" onclick="go('proyectos')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Proyectos</div>
    <div class="divider"></div>
    <div class="sbSection">Sistema</div>
    <div class="ni" onclick="go('config')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>Configuración</div>
    <div class="ni" id="niAdmin" onclick="go('usuarios')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Usuarios</div>
    <div class="sbFoot">
      <div class="ubadge">
        <div class="uav" id="uav">AD</div>
        <div><div id="uname" style="font-size:12px;font-weight:600">Admin</div><div id="urole" style="font-size:10px;color:var(--cyan)">Administrador</div></div>
        <div class="lout" onclick="logout()">✕</div>
      </div>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>
<script>
var SB_URL='https://metirtnwksooxukzqoti.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ldGlydG53a3Nvb3h1a3pxb3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwMTQsImV4cCI6MjA5MjI4NTAxNH0.AP0FRv8AyCWILlcbCa8aCpcp155CL0QwflYqDn5mrB0';
function sbH(){return{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};}
function sbGet(t,p){return fetch(SB_URL+'/rest/v1/'+t+'?'+(p||''),{headers:sbH()}).then(function(r){return r.json();});}
function sbPost(t,b){return fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:Object.assign({'Prefer':'return=representation'},sbH()),body:JSON.stringify(b)}).then(function(r){return r.json();});}
function sbPatch(t,id,b){return fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:Object.assign({'Prefer':'return=representation'},sbH()),body:JSON.stringify(b)}).then(function(r){return r.json();});}
function sbDelete(t,id){return fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'DELETE',headers:sbH()});}
function sbDeleteWhere(t,col,val){return fetch(SB_URL+'/rest/v1/'+t+'?'+col+'=eq.'+val,{method:'DELETE',headers:sbH()});}

var USERS=[{id:1,u:'leex',p:'2026',name:'Administrador',role:'admin',ini:'AD'},{id:2,u:'lector1',p:'leex123',name:'Lectura 1',role:'reader',ini:'L1'},{id:3,u:'lector2',p:'leex456',name:'Lectura 2',role:'reader',ini:'L2'}];
var CU=null;
var C={config:{saldo_inicial_banco:12453.05,banco_nombre:'International Finance Bank',banco_cuenta:'001-LEEX-2026'},proyectos:[],cuentas:[],gastos:[],asientos:[],lineas:[],movs:[],comex:[],proy_ingresos:[],proy_gastos:[],cfg_cat_asientos:['Asiento Genérico','Saldo Inicial','Cierre de Ejercicio','Ajuste'],cfg_proveedores:['Enmind','Comen'],cfg_conceptos_gasto:['Viáticos','Gastos Varios','Oficina Chile','Alquiler','Sueldo'],cfg_estados_gasto:['Pendiente','Pagado'],cfg_quien_pago:['Leex','Deam','IBS','Neuroventas'],cfg_tipo_op:['Pago Exterior','Nacionalización','Chile']};
var bancoFiltro='todos';
var bancoDesde='',bancoHasta='';

var asientoTab='libro',mayorCuenta='',aBusca='',pendingAsiento=null,alineCount=0,editCuentaId=null;
var selProyId=null,proyTab='comex';

function login(){
  var u=document.getElementById('lu').value.trim().toLowerCase();
  var p=document.getElementById('lp').value.trim();
  var user=null;
  for(var i=0;i<USERS.length;i++){if(USERS[i].u===u&&USERS[i].p===p){user=USERS[i];break;}}
  if(!user){document.getElementById('lerr').style.display='block';return;}
  document.getElementById('lerr').style.display='none';
  CU=user;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('uav').textContent=user.ini;
  document.getElementById('uname').textContent=user.name;
  document.getElementById('urole').textContent=user.role==='admin'?'Administrador':'Solo Lectura';
  if(user.role!=='admin')document.getElementById('niAdmin').style.display='none';
  try{var lc=localStorage.getItem('leex_cfg');if(lc){var o=JSON.parse(lc);['cfg_cat_asientos','cfg_proveedores','cfg_conceptos_gasto','cfg_estados_gasto','cfg_quien_pago','cfg_tipo_op'].forEach(function(k){if(o[k])C[k]=o[k];});}}catch(e){}
  loadAll().then(function(){go('dashboard');});
}
function logout(){CU=null;document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';}
function isAdmin(){return CU&&CU.role==='admin';}
function saveCfg(){try{localStorage.setItem('leex_cfg',JSON.stringify({cfg_cat_asientos:C.cfg_cat_asientos,cfg_proveedores:C.cfg_proveedores,cfg_conceptos_gasto:C.cfg_conceptos_gasto,cfg_estados_gasto:C.cfg_estados_gasto,cfg_quien_pago:C.cfg_quien_pago,cfg_tipo_op:C.cfg_tipo_op}));}catch(e){}}

function loadAll(){
  document.getElementById('main').innerHTML='<div class="loading"><div class="spinner"></div>Cargando datos...</div>';
  return Promise.all([
    sbGet('configuracion','select=clave,valor'),
    sbGet('cuentas','select=*&order=codigo'),
    sbGet('gastos','select=*&order=fecha'),
    sbGet('asientos','select=*&order=fecha'),
    sbGet('asiento_lineas','select=*&order=asiento_id'),
    sbGet('movimientos_banco','select=*&order=fecha'),
    sbGet('comex','select=*&order=id'),
    sbGet('proy_ingresos','select=*&order=id'),
    sbGet('proy_gastos','select=*&order=id'),
    sbGet('proyectos','select=*&order=id')
  ]).then(function(res){
    if(Array.isArray(res[0]))res[0].forEach(function(r){
      if(r.clave==='saldo_inicial_banco')C.config.saldo_inicial_banco=parseFloat(r.valor);
      if(r.clave==='banco_nombre')C.config.banco_nombre=r.valor;
      if(r.clave==='banco_cuenta')C.config.banco_cuenta=r.valor;
    });
    C.cuentas=Array.isArray(res[1])?res[1]:[];
    C.gastos=Array.isArray(res[2])?res[2]:[];
    C.asientos=Array.isArray(res[3])?res[3]:[];
    C.lineas=Array.isArray(res[4])?res[4]:[];
    C.movs=Array.isArray(res[5])?res[5]:[];
    C.comex=Array.isArray(res[6])?res[6]:[];
    C.proy_ingresos=Array.isArray(res[7])?res[7]:[];
    C.proy_gastos=Array.isArray(res[8])?res[8]:[];
    C.proyectos=Array.isArray(res[9])?res[9]:[];
    if(!selProyId&&C.proyectos.length>0)selProyId=C.proyectos[0].id;
  }).catch(function(e){
    document.getElementById('main').innerHTML='<div class="alert aerr">Error Supabase: '+e.message+'</div>';
  });
}

function go(page){
  document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('active');});
  var map={dashboard:0,gastos:1,asientos:2,banco:3,balance:4,resultados:5,cuentas:6,proyectos:8,config:10,usuarios:11};
  var items=document.querySelectorAll('.ni');
  if(map[page]!==undefined&&items[map[page]])items[map[page]].classList.add('active');
  var pages={dashboard:pgDashboard,gastos:pgGastos,asientos:pgAsientos,banco:pgBanco,balance:pgBalance,resultados:pgResultados,cuentas:pgCuentas,proyectos:pgProyectos,config:pgConfig,usuarios:pgUsuarios};
  document.getElementById('main').innerHTML=pages[page]?pages[page]():'<p>En construcción</p>';
}
function reload(page){
  document.getElementById('main').innerHTML='<div class="loading"><div class="spinner"></div>Actualizando...</div>';
  loadAll().then(function(){go(page);});
}

function fmt(v){return '$'+Math.abs(parseFloat(v)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtD(d){return d?d.split('-').reverse().join('/'):''}
function fmtN(v){return(parseFloat(v)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function getCta(cod){for(var i=0;i<C.cuentas.length;i++)if(C.cuentas[i].codigo===cod)return C.cuentas[i];return null;}
function saldoBanco(){var s=C.config.saldo_inicial_banco;C.movs.forEach(function(m){s+=parseFloat(m.monto);});return s;}
function totalGastos(){var s=0;C.gastos.forEach(function(g){s+=parseFloat(g.monto);});return s;}
function lineasDeAsiento(aid){return C.lineas.filter(function(l){return l.asiento_id===aid;});}
function ctasOpts(sel){var h='';C.cuentas.forEach(function(c){h+='<option value="'+c.codigo+'"'+(c.codigo===sel?' selected':'')+'>'+c.codigo+' - '+c.nombre+'</option>';});return h;}
function listOpts(arr,sel){var h='';arr.forEach(function(v){h+='<option value="'+v+'"'+(v===sel?' selected':'')+'>'+v+'</option>';});return h;}
function hoy(){return new Date().toISOString().split('T')[0];}
function mesLabel(d){var ms=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];var p=d.split('-');return ms[parseInt(p[1])-1]+' '+p[0];}
function exportExcel(data,cols,filename,sheet){var ws=XLSX.utils.json_to_sheet(data,{header:cols});var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,sheet||'Datos');XLSX.writeFile(wb,filename+'.xlsx');}

function pgGastos(){
  var ro=!isAdmin();
  var fil=C.gastos.filter(function(g){
    if(gFiltros.desde&&g.fecha<gFiltros.desde)return false;
    if(gFiltros.hasta&&g.fecha>gFiltros.hasta)return false;
    if(gFiltros.cuenta&&g.cuenta_codigo!==gFiltros.cuenta)return false;
    return true;
  });
  var tot=0;fil.forEach(function(g){tot+=parseFloat(g.monto);});
  var rows='';fil.forEach(function(g){rows+='<tr><td>'+fmtD(g.fecha)+'</td><td>'+g.descripcion+'</td><td>'+(g.comprobante||'-')+'</td><td>'+g.cuenta_codigo+'</td><td>'+g.metodo+'</td><td class="red">'+fmt(g.monto)+'</td></tr>';});

    '<div class="factions"><button class="btn bp" onclick="addGasto()">Registrar</button></div></div>';
  return '<div class="pageTitle">Registro de Gastos</div>'+form+
    '<div class="twrap"><div class="thead2"><h3>Gastos — '+fil.length+'</h3><span style="font-size:12px;color:var(--text2)">Total: <strong class="red">'+fmt(tot)+'</strong></span></div>'+
    '<table><thead><tr><th>Fecha</th><th>Descripción</th><th>Comprobante</th><th>Cuenta</th><th>Método</th><th>Monto</th></tr></thead>'+

    '<tr class="trow"><td colspan="5">TOTAL</td><td>'+fmt(tot)+'</td></tr></tbody></table></div>';

function addGasto(){
  var f=document.getElementById('gF').value,d=document.getElementById('gD').value.trim(),m=parseFloat(document.getElementById('gM').value);
  if(!f||!d||isNaN(m)||m<=0){alert('Completá todos los campos.');return;}
  sbPost('gastos',{fecha:f,descripcion:d,comprobante:document.getElementById('gC').value,cuenta_codigo:document.getElementById('gCta').value,monto:m,metodo:document.getElementById('gMet').value}).then(function(){reload('gastos');});
}

function addLine(){alineCount++;var id=alineCount;var div=document.createElement('div');div.className='aline';div.id='al'+id;div.innerHTML='<select onchange="chkBal()"><option value="">--</option>'+ctasOpts('')+'</select><input type="text" placeholder="Detalle"/><input type="number" placeholder="Debe" min="0" step="0.01" oninput="chkBal()"/><input type="number" placeholder="Haber" min="0" step="0.01" oninput="chkBal()"/><button class="rlbtn" onclick="document.getElementById(\'al'+id+'\').remove();chkBal()">✕</button>';document.getElementById('alines').appendChild(div);chkBal();}
function getLines(){var rows=document.querySelectorAll('#alines .aline'),res=[];for(var i=0;i<rows.length;i++){var r=rows[i],ins=r.querySelectorAll('input');res.push({cuenta:r.querySelector('select').value,det:ins[0].value,debe:parseFloat(ins[1].value)||0,haber:parseFloat(ins[2].value)||0});}return res;}
function chkBal(){var ls=getLines(),d=0,h=0;ls.forEach(function(l){d+=l.debe;h+=l.haber;});var el=document.getElementById('bchk');if(!el)return;if(Math.abs(d-h)<0.001&&d>0){el.className='bcheck bok';el.textContent='✓ Balanceado: '+fmt(d);}else{el.className='bcheck berr';el.textContent='✗ '+fmt(d)+' ≠ '+fmt(h);}}
function saveAsiento(){
  var f=document.getElementById('aF').value,d=document.getElementById('aD').value.trim(),r=document.getElementById('aR').value.trim(),cat=document.getElementById('aCat').value,movId=document.getElementById('aPendMovId').value;
  var ls=getLines(),db=0,hb=0;ls.forEach(function(l){db+=l.debe;hb+=l.haber;});
  if(!f||!d){alert('Completá fecha y descripción.');return;}
  if(ls.length<2){alert('Mínimo 2 líneas.');return;}
  if(Math.abs(db-hb)>0.001){alert('No balanceado.');return;}
  // Validar que todas las cuentas estén seleccionadas
  for(var i=0;i<ls.length;i++){if(!ls[i].cuenta){alert('Seleccioná una cuenta en todas las líneas.');return;}}
  sbPost('asientos',{fecha:f,descripcion:d,referencia:r||'AST-nuevo',origen:movId?'banco':'manual',categoria:cat}).then(function(res){
    var ast=Array.isArray(res)?res[0]:res;
    if(!ast||!ast.id){
      alert('Error al crear el asiento. Detalle: '+(res&&res.message?res.message:JSON.stringify(res)));
      return;
    }
    var astId=ast.id;
    sbPatch('asientos',astId,{referencia:r||'AST-'+String(astId).padStart(3,'0')});
    var lineasBody=ls.map(function(l){return{asiento_id:astId,cuenta_codigo:l.cuenta,detalle:l.det,debe:l.debe,haber:l.haber};});
    sbPost('asiento_lineas',lineasBody).then(function(resL){
      // Verificar si hubo error en las líneas
      if(resL&&resL.code){
        alert('Error al guardar líneas: '+resL.message+'\nVerificá que las cuentas existan en el plan de cuentas.');
        sbDelete('asientos',astId);
        return;
      }
      if(movId){
        sbPatch('movimientos_banco',movId,{asiento_id:astId}).then(function(){
          pendingAsiento=null;alineCount=0;asientoTab='libro';reload('asientos');
        });
      } else {
        pendingAsiento=null;alineCount=0;asientoTab='libro';reload('asientos');
      }
    });
  });
}
function deleteAsiento(id){
  if(!confirm('¿Eliminar asiento AST-'+String(id).padStart(3,'0')+'?'))return;
  // Verificar si este asiento está vinculado a un movimiento conciliado
  var movConciliado=C.movs.find(function(m){return m.asiento_id===id&&m.conciliado;});
  if(movConciliado){
    alert('Este asiento está vinculado a un movimiento conciliado.\nPrimero desconciliá el movimiento en Conciliación Bancaria y luego eliminá el asiento.');
    return;
  }
  // Si está vinculado a un movimiento no conciliado, limpiar la referencia
  var movVinculado=C.movs.find(function(m){return m.asiento_id===id;});
  var promesaLimpiar=movVinculado?sbPatch('movimientos_banco',movVinculado.id,{asiento_id:null}):Promise.resolve();
  promesaLimpiar.then(function(){
    sbDeleteWhere('asiento_lineas','asiento_id',id).then(function(){
      sbDelete('asientos',id).then(function(){reload('asientos');});
    });
  });
}
function genAsiento(id){
  var m=C.movs.find(function(x){return x.id===id;});if(!m)return;
  asientoTab='nuevo';
  pendingAsiento={fecha:m.fecha,desc:m.descripcion,ref:'AST-nuevo',movId:m.id,
    lineas:parseFloat(m.monto)>0?[{cuenta:'1.1.01',det:m.descripcion,debe:Math.abs(m.monto),haber:0},{cuenta:'4.1.01',det:m.descripcion,debe:0,haber:Math.abs(m.monto)}]:[{cuenta:'5.1.07',det:m.descripcion,debe:Math.abs(m.monto),haber:0},{cuenta:'1.1.01',det:m.descripcion,debe:0,haber:Math.abs(m.monto)}]};
  go('asientos');
}

function conciliar(id){sbPatch('movimientos_banco',id,{conciliado:true}).then(function(){reload('banco');});}
function desconciliar(id){if(!confirm('¿Desconciliar este movimiento?'))return;sbPatch('movimientos_banco',id,{conciliado:false}).then(function(){reload('banco');});}
function attachFact(id,inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){sbPatch('movimientos_banco',id,{factura_nombre:f.name,factura_tipo:f.type,factura_data:e.target.result}).then(function(){reload('banco');});};r.readAsDataURL(f);}
function viewFact(id){var m=C.movs.find(function(x){return x.id===id;});if(!m||!m.factura_data)return;var w=window.open('','_blank');if(m.factura_tipo==='application/pdf')w.document.write('<iframe src="'+m.factura_data+'" style="width:100%;height:100vh;border:none"></iframe>');else w.document.write('<img src="'+m.factura_data+'" style="max-width:100%"/>');}
function parseCSV(txt){var sep=txt.indexOf(';')>-1?';':',';var lines=txt.trim().split(/\r?\n/).filter(function(l){return l.trim();});if(lines.length<2)return[];function splitL(line){var res=[],cur='',inq=false;for(var i=0;i<line.length;i++){if(line[i]==='"'){inq=!inq;}else if(line[i]===sep&&!inq){res.push(cur.trim().replace(/^"|"$/g,''));cur='';}else cur+=line[i];}res.push(cur.trim().replace(/^"|"$/g,''));return res;}var hdr=splitL(lines[0]).map(function(h){return h.toLowerCase().trim();});function gi(ns){for(var i=0;i<ns.length;i++){var x=hdr.indexOf(ns[i]);if(x>-1)return x;}return -1;}var iDate=gi(['processed date','date','fecha']),iDesc=gi(['description','descripcion','descripción','concepto']),iCOD=gi(['credit or debit','tipo']),iAmt=gi(['amount','monto','importe']),iDebe=gi(['debe','débito','debito']),iHaber=gi(['haber','crédito','credito']);function normF(f){f=f.trim();if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(f)){var p=f.split('/');return p[2]+'-'+p[0].padStart(2,'0')+'-'+p[1].padStart(2,'0');}if(/^\d{4}-\d{2}-\d{2}/.test(f))return f.slice(0,10);return f;}function pM(v){return parseFloat((v||'').replace(/[$,]/g,''))||0;}var res=[];for(var i=1;i<lines.length;i++){var c=splitL(lines[i]);if(c.length<2)continue;var fecha=normF(iDate>-1?c[iDate]:'');if(!fecha)continue;var desc=(iDesc>-1?c[iDesc]:'')||'Sin descripción';var monto=0;if(iCOD>-1&&iAmt>-1){var cod=(c[iCOD]||'').toLowerCase();var amt=pM(c[iAmt]);monto=cod.indexOf('debit')>-1?-Math.abs(amt):Math.abs(amt);}else if(iDebe>-1&&iHaber>-1){monto=pM(c[iHaber])-pM(c[iDebe]);}else if(iAmt>-1){monto=pM(c[iAmt]);}if(monto===0)continue;res.push({fecha:fecha,desc:desc,monto:monto});}return res;}
function showCSVPrev(rows,nombre){if(rows.length===0){document.getElementById('csvPrev').innerHTML='<div class="alert aerr" style="margin-top:10px">⚠ No se interpretaron filas.</div>';return;}var cr=0,db=0;rows.forEach(function(r){if(r.monto>0)cr+=r.monto;else db+=r.monto;});var trs='';rows.slice(0,6).forEach(function(r){trs+='<tr><td style="padding:5px 10px;font-size:11px;border-top:1px solid var(--border)">'+fmtD(r.fecha)+'</td><td style="padding:5px 10px;font-size:11px;border-top:1px solid var(--border)">'+r.desc+'</td><td style="padding:5px 10px;border-top:1px solid var(--border)"><span class="badge '+(r.monto>0?'bg':'br')+'">'+(r.monto>0?'Créd':'Déb')+'</span></td><td style="padding:5px 10px;font-size:11px;border-top:1px solid var(--border);color:'+(r.monto>0?'var(--green)':'var(--red)')+';">'+(r.monto>0?'+':'')+fmt(r.monto)+'</td></tr>';});var encoded=encodeURIComponent(JSON.stringify(rows));document.getElementById('csvPrev').innerHTML='<div style="margin-top:12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden"><div style="padding:9px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between"><span style="font-size:12px;font-weight:600"><span class="cyan">'+rows.length+' movimientos</span> · '+nombre+'</span><div style="display:flex;gap:8px"><span class="green" style="font-size:11px">+'+fmt(cr)+'</span><span class="red" style="font-size:11px">'+fmt(db)+'</span></div></div><div style="max-height:180px;overflow-y:auto"><table style="width:100%"><thead><tr><th style="padding:6px 10px;font-size:10px;background:var(--bg2)">Fecha</th><th style="padding:6px 10px;font-size:10px;background:var(--bg2)">Descripción</th><th style="padding:6px 10px;font-size:10px;background:var(--bg2)">Tipo</th><th style="padding:6px 10px;font-size:10px;background:var(--bg2)">Monto</th></tr></thead><tbody>'+trs+(rows.length>6?'<tr><td colspan="4" style="padding:6px 10px;font-size:11px;color:var(--text2);border-top:1px solid var(--border)">... y '+(rows.length-6)+' más</td></tr>':'')+'</tbody></table></div><div style="padding:9px 13px;border-top:1px solid var(--border);display:flex;gap:7px"><button class="btn bp" onclick="confirmCSV(\''+encoded+'\')">✓ Importar</button><button class="btn bs" onclick="document.getElementById(\'csvPrev\').innerHTML=\'\'">Cancelar</button></div></div>';}
function loadCSVFile(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){showCSVPrev(parseCSV(ev.target.result),f.name);};r.readAsText(f,'UTF-8');}
function loadCSVText(){var txt=document.getElementById('csvTxt').value.trim();if(!txt){alert('Pegá el contenido.');return;}showCSVPrev(parseCSV(txt),'texto pegado');}
function confirmCSV(encoded){var rows=JSON.parse(decodeURIComponent(encoded));var nuevos=rows.filter(function(r){return !C.movs.find(function(m){return m.fecha===r.fecha&&m.descripcion===r.desc&&parseFloat(m.monto)===r.monto;});});if(nuevos.length===0){alert('Todos ya existen.');return;}sbPost('movimientos_banco',nuevos.map(function(r){return{fecha:r.fecha,descripcion:r.desc,monto:r.monto,conciliado:false};})).then(function(){reload('banco');if(nuevos.length<rows.length)alert(nuevos.length+' importados, '+(rows.length-nuevos.length)+' duplicados omitidos.');});}
function addMov(){var t=document.getElementById('mT').value,m=parseFloat(document.getElementById('mM').value),f=document.getElementById('mF').value,d=document.getElementById('mD').value.trim();if(!f||!d||isNaN(m)){alert('Completá todos los campos.');return;}sbPost('movimientos_banco',{fecha:f,descripcion:d,monto:t==='Crédito'?Math.abs(m):-Math.abs(m),conciliado:false}).then(function(){reload('banco');});}

// ===== BALANCE =====
function pgBalance(){
  function saldoCta(cod,tipo){var s=0;C.lineas.forEach(function(l){if(l.cuenta_codigo!==cod)return;s+=tipo==='Activo'?parseFloat(l.debe)-parseFloat(l.haber):parseFloat(l.haber)-parseFloat(l.debe);});return s;}
  function seccion(tipo){var rows='',tot=0,exData=[];C.cuentas.forEach(function(c){if(c.tipo!==tipo)return;var s=saldoCta(c.codigo,tipo);if(s===0)return;tot+=s;rows+='<tr><td style="font-family:monospace">'+c.codigo+'</td><td>'+c.nombre+'</td><td>'+fmt(s)+'</td></tr>';exData.push({Codigo:c.codigo,Cuenta:c.nombre,Saldo:s});});return{rows:rows,tot:tot,exData:exData};}

  // Calcular resultado neto (ingresos - gastos)
  function calcS(cod,esIng){var s=0;C.lineas.forEach(function(l){if(l.cuenta_codigo===cod)s+=esIng?parseFloat(l.haber)-parseFloat(l.debe):parseFloat(l.debe)-parseFloat(l.haber);});return s;}
  var totIng=0,totGas=0;
  C.cuentas.forEach(function(c){
    if(c.tipo==='Ingreso'){totIng+=calcS(c.codigo,true);}
    if(c.tipo==='Gasto'){var gasReg=0;C.gastos.forEach(function(g){if(g.cuenta_codigo===c.codigo)gasReg+=parseFloat(g.monto);});totGas+=calcS(c.codigo,false)+gasReg;}
  });
  var resultadoNeto=totIng-totGas;

  var act=seccion('Activo'),pas=seccion('Pasivo'),pat=seccion('Patrimonio');

  // Agregar resultado neto al patrimonio
  var patRows=pat.rows;
  var patTot=pat.tot+resultadoNeto;
  var patExData=pat.exData.slice();
  if(resultadoNeto!==0){
    patRows+='<tr style="background:rgba(14,165,233,.05)"><td style="font-family:monospace;color:var(--cyan)">R.Eje</td><td style="color:var(--cyan)">Resultado del Ejercicio</td><td style="color:'+(resultadoNeto>=0?'var(--green)':'var(--red)')+'">'+fmt(resultadoNeto)+'</td></tr>';
    patExData.push({Codigo:'R.Eje',Cuenta:'Resultado del Ejercicio',Saldo:resultadoNeto});
  }

  var ok=Math.abs(act.tot-pas.tot-patTot)<1;
  var allEx=act.exData.concat([{Codigo:'',Cuenta:'TOTAL ACTIVO',Saldo:act.tot}]).concat(pas.exData).concat([{Codigo:'',Cuenta:'TOTAL PASIVO',Saldo:pas.tot}]).concat(patExData).concat([{Codigo:'',Cuenta:'TOTAL PATRIMONIO',Saldo:patTot}]);

  return '<div class="pageTitle">Balance General — 2026<button class="btn bs sm" style="margin-left:auto" onclick=\'exportExcel('+JSON.stringify(allEx)+',[\"Codigo\",\"Cuenta\",\"Saldo\"],\"Balance_2026\",\"Balance\")\'>⬇ Excel</button></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'+
    '<div class="twrap"><div class="thead2"><h3>ACTIVO</h3></div><table><thead><tr><th>Código</th><th>Cuenta</th><th>Saldo</th></tr></thead><tbody>'+(act.rows||'<tr><td colspan="3" style="text-align:center;color:var(--text2);padding:12px">Sin movimientos</td></tr>')+'<tr class="trow"><td colspan="2">TOTAL ACTIVO</td><td class="green">'+fmt(act.tot)+'</td></tr></tbody></table></div>'+
    '<div>'+
    '<div class="twrap" style="margin-bottom:14px"><div class="thead2"><h3>PASIVO</h3></div><table><thead><tr><th>Código</th><th>Cuenta</th><th>Saldo</th></tr></thead><tbody>'+(pas.rows||'<tr><td colspan="3" style="text-align:center;color:var(--text2);padding:12px">Sin movimientos</td></tr>')+'<tr class="trow"><td colspan="2">TOTAL PASIVO</td><td class="red">'+fmt(pas.tot)+'</td></tr></tbody></table></div>'+
    '<div class="twrap"><div class="thead2"><h3>PATRIMONIO</h3></div><table><thead><tr><th>Código</th><th>Cuenta</th><th>Saldo</th></tr></thead><tbody>'+(patRows||'<tr><td colspan="3" style="text-align:center;color:var(--text2);padding:12px">Sin movimientos</td></tr>')+'<tr class="trow"><td colspan="2">TOTAL PATRIMONIO</td><td class="cyan">'+fmt(patTot)+'</td></tr></tbody></table></div>'+
    '</div></div>'+
    '<div class="alert '+(ok?'aok':'ainfo')+'" style="margin-top:12px">'+(ok?'✓ Balance cuadrado — Activo = Pasivo + Patrimonio':'⚠ Diferencia: '+fmt(act.tot-pas.tot-patTot))+'</div>';
}

function pgResultados(){
  function calcS(cod,esIng){var s=0;C.lineas.forEach(function(l){if(l.cuenta_codigo===cod)s+=esIng?parseFloat(l.haber)-parseFloat(l.debe):parseFloat(l.debe)-parseFloat(l.haber);});return s;}
  var ingRows='',gasRows='',totIng=0,totGas=0,exData=[];

    if(c.tipo==='Gasto'){var gasReg=0;C.gastos.forEach(function(g){if(g.cuenta_codigo===c.codigo)gasReg+=parseFloat(g.monto);});var s=calcS(c.codigo,false)+gasReg;if(s){totGas+=s;gasRows+='<tr><td>'+c.nombre+'</td><td>'+c.codigo+'</td><td class="red">'+fmt(s)+'</td></tr>';exData.push({Tipo:'Gasto',Cuenta:c.nombre,Codigo:c.codigo,Monto:s});}}
  });
  exData.push({Tipo:'RESULTADO',Cuenta:'Neto',Codigo:'',Monto:totIng-totGas});
  var res=totIng-totGas;
  return '<div class="pageTitle">Estado de Resultados — 2026<button class="btn bs sm" style="margin-left:auto" onclick=\'exportExcel('+JSON.stringify(exData)+',[\"Tipo\",\"Cuenta\",\"Codigo\",\"Monto\"],\"Resultados_2026\",\"Resultados\")\'>⬇ Excel</button></div>'+
    '<div class="twrap" style="max-width:660px"><div class="thead2"><h3>LEEX — Estado de Resultados</h3></div><table><thead><tr><th>Concepto</th><th>Cuenta</th><th>Monto</th></tr></thead><tbody>'+
    '<tr><td colspan="3" style="font-weight:700;color:var(--cyan);padding-top:10px">INGRESOS</td></tr>'+(ingRows||'<tr><td colspan="3" style="color:var(--text2);font-size:12px;padding-left:12px">Sin ingresos</td></tr>')+
    '<tr class="trow"><td colspan="2">Total Ingresos</td><td class="green">'+fmt(totIng)+'</td></tr>'+
    '<tr><td colspan="3" style="font-weight:700;color:var(--red);padding-top:10px">GASTOS</td></tr>'+(gasRows||'<tr><td colspan="3" style="color:var(--text2);font-size:12px;padding-left:12px">Sin gastos</td></tr>')+
    '<tr class="trow"><td colspan="2">Total Gastos</td><td class="red">'+fmt(totGas)+'</td></tr>'+
    '<tr class="trow" style="font-size:14px"><td colspan="2">RESULTADO NETO</td><td class="'+(res>=0?'green':'red')+'">'+(res>=0?'Ganancia ':'Pérdida ')+fmt(res)+'</td></tr></tbody></table></div>';
}

  var editForm='';
  if(editCuentaId!==null){var ec=C.cuentas.find(function(c){return c.id===editCuentaId;});if(ec)editForm='<div class="panel" style="border-color:var(--cyan)"><h3>✏ Editando: '+ec.codigo+'</h3><div class="fg3"><div class="f"><label>Código</label><input type="text" id="eCod" value="'+ec.codigo+'"/></div><div class="f"><label>Nombre</label><input type="text" id="eNom" value="'+ec.nombre+'"/></div><div class="f"><label>Tipo</label><select id="eTip"><option'+(ec.tipo==='Activo'?' selected':'')+'>Activo</option><option'+(ec.tipo==='Pasivo'?' selected':'')+'>Pasivo</option><option'+(ec.tipo==='Patrimonio'?' selected':'')+'>Patrimonio</option><option'+(ec.tipo==='Ingreso'?' selected':'')+'>Ingreso</option><option'+(ec.tipo==='Gasto'?' selected':'')+'>Gasto</option></select></div></div><div class="factions"><button class="btn bp" onclick="updateCuenta()">Guardar</button><button class="btn bs" onclick="editCuentaId=null;go(\'cuentas\')">Cancelar</button></div></div>';}
  return '<div class="pageTitle">Plan de Cuentas</div>'+(!ro?'<div class="panel"><h3>Nueva Cuenta</h3><div class="fg3"><div class="f"><label>Código</label><input type="text" id="cC" placeholder="5.1.08"/></div><div class="f"><label>Nombre</label><input type="text" id="cN"/></div><div class="f"><label>Tipo</label><select id="cT"><option>Activo</option><option>Pasivo</option><option>Patrimonio</option><option>Ingreso</option><option>Gasto</option></select></div></div><div class="factions"><button class="btn bp" onclick="addCuenta()">Agregar</button></div></div>':'')+editForm+'<div class="twrap"><div class="thead2"><h3>Plan de Cuentas</h3><span style="font-size:12px;color:var(--text2)">'+C.cuentas.length+' cuentas</span></div><table><thead><tr><th>Código</th><th>Nombre</th><th>Tipo</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function editCuenta(id){editCuentaId=id;go('cuentas');}
function updateCuenta(){var cod=document.getElementById('eCod').value.trim(),nom=document.getElementById('eNom').value.trim(),tip=document.getElementById('eTip').value;if(!cod||!nom){alert('Completá los campos.');return;}sbPatch('cuentas',editCuentaId,{codigo:cod,nombre:nom,tipo:tip}).then(function(){editCuentaId=null;reload('cuentas');});}
function deleteCuenta(id,cod){if(!confirm('¿Eliminar la cuenta '+cod+'?'))return;sbDelete('cuentas',id).then(function(){reload('cuentas');});}
function addCuenta(){var cod=document.getElementById('cC').value.trim(),nom=document.getElementById('cN').value.trim();if(!cod||!nom){alert('Completá código y nombre.');return;}if(C.cuentas.find(function(c){return c.codigo===cod;})){alert('Código ya existe.');return;}sbPost('cuentas',{codigo:cod,nombre:nom,tipo:document.getElementById('cT').value}).then(function(){reload('cuentas');});}

// ===== PROYECTOS =====
function pgProyectos(){
  var ro=!isAdmin();
  var proy=C.proyectos.find(function(p){return p.id===selProyId;})||null;
  var cards='';
  C.proyectos.forEach(function(p){
    var ing=0,gas=0,nComex=0;
    C.proy_ingresos.forEach(function(i){if(i.proyecto_id===p.id)ing+=parseFloat(i.monto)||0;});
    C.proy_gastos.forEach(function(g){if(g.proyecto_id===p.id)gas+=parseFloat(g.importe)||0;});
    C.comex.forEach(function(c){if(c.proyecto_id===p.id)nComex++;});
    cards+='<div class="card" style="cursor:pointer;border-color:'+(selProyId===p.id?'var(--cyan)':'var(--border)')+'" onclick="selProyId='+p.id+';proyTab=\'comex\';go(\'proyectos\')">'+
      '<div style="font-weight:700;font-size:14px;margin-bottom:8px;color:'+(selProyId===p.id?'var(--cyan)':'var(--text)')+'">'+p.nombre+'</div>'+
      '<div style="font-size:11px;color:var(--text2);margin-bottom:3px">Ingresos: <span class="green">'+fmt(ing)+'</span></div>'+
      '<div style="font-size:11px;color:var(--text2);margin-bottom:3px">Gastos: <span class="red">'+fmt(gas)+'</span></div>'+
      '<div style="font-size:11px;color:var(--text2)">COMEX: '+nComex+' ops.</div></div>';
  });
  var newForm=!ro?
    '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px">'+
    '<input type="text" id="npNom" placeholder="Nombre del nuevo proyecto" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:7px;font-size:12px;outline:none;width:220px"/>'+
    '<input type="text" id="npDesc" placeholder="Descripción (opcional)" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:7px;font-size:12px;outline:none;flex:1"/>'+
    '<button class="btn bp sm" onclick="crearProyecto()">+ Crear Proyecto</button></div>':'';
  if(!proy){
    return '<div class="pageTitle">Proyectos</div>'+newForm+'<div class="cards">'+cards+'</div><div class="alert ainfo">Seleccioná un proyecto para ver su detalle.</div>';
  }
  var tabs='<div class="tabs">'+
    '<div class="tab'+(proyTab==='comex'?' active':'')+'" onclick="proyTab=\'comex\';go(\'proyectos\')">🌐 COMEX</div>'+
    '<div class="tab'+(proyTab==='ingresos'?' active':'')+'" onclick="proyTab=\'ingresos\';go(\'proyectos\')">📈 Ingresos</div>'+
    '<div class="tab'+(proyTab==='gastos'?' active':'')+'" onclick="proyTab=\'gastos\';go(\'proyectos\')">📉 Gastos</div>'+
    '</div>';
  var tabContent='';
  if(proyTab==='comex')tabContent=renderComex(proy,ro);
  if(proyTab==='ingresos')tabContent=renderProyIngresos(proy,ro);
  if(proyTab==='gastos')tabContent=renderProyGastos(proy,ro);
  return '<div class="pageTitle">Proyectos</div>'+newForm+
    '<div class="cards" style="margin-bottom:16px">'+cards+'</div>'+
    '<div style="background:var(--bg2);border:1px solid var(--cyan);border-radius:12px;padding:18px">'+
    '<div style="font-size:16px;font-weight:700;margin-bottom:14px;color:var(--cyan)">📁 '+proy.nombre+'</div>'+
    tabs+tabContent+'</div>';
}
function crearProyecto(){
  var nom=document.getElementById('npNom').value.trim(),desc=document.getElementById('npDesc').value.trim();
  if(!nom){alert('Ingresá un nombre.');return;}
  sbPost('proyectos',{nombre:nom,descripcion:desc,activo:true}).then(function(res){
    var np=Array.isArray(res)?res[0]:res;
    if(np&&np.id)selProyId=np.id;
    proyTab='comex';reload('proyectos');
  });
}
function renderComex(proy,ro){
  var fil=C.comex.filter(function(r){return r.proyecto_id===proy.id;});
  var rows='';
  fil.forEach(function(r){
    var dolaresNac=(parseFloat(r.usd_fob)||0)*(parseFloat(r.pct_nac)||0)/100;
    var importe=r.tipo_op==='Nacionalización'?dolaresNac*(parseFloat(r.tipo_cambio)||0):(parseFloat(r.usd_fob)||0)*(parseFloat(r.tipo_cambio)||0);
    var archivoCell=r.archivo?'<a href="'+r.archivo+'" target="_blank" style="color:var(--cyan);font-size:11px">'+(r.archivo.indexOf('drive.google')>-1?'📁':'🔗')+' Ver</a>':'<span style="color:var(--text2);font-size:11px">—</span>';
    rows+='<tr><td>'+fmtD(r.fecha_inicio)+'</td><td><span class="badge bb">'+r.tipo_op+'</span></td><td>'+r.pedido+'</td><td>'+r.proveedor+'</td><td class="cyan">'+fmtN(r.usd_fob)+'</td><td>'+fmtN(r.pct_nac)+'%</td><td class="cyan">'+fmtN(dolaresNac)+'</td><td>'+fmtN(r.tipo_cambio)+'</td><td class="yellow">$'+fmtN(importe)+'</td><td>'+archivoCell+'</td>'+(!ro?'<td><button class="btn sm bd" onclick="delComex('+r.id+')">✕</button></td>':'')+'</tr>';
  });
  var form=ro?'':'<div class="panel"><h3>Nueva Operación COMEX — '+proy.nombre+'</h3>'+
    '<div class="fg4"><div class="f"><label>Fecha Inicio</label><input type="date" id="cxF" value="'+hoy()+'"/></div><div class="f"><label>Tipo</label><select id="cxTipo">'+listOpts(C.cfg_tipo_op,'')+'</select></div><div class="f"><label>Pedido</label><input type="text" id="cxPed"/></div><div class="f"><label>Proveedor</label><select id="cxProv">'+listOpts(C.cfg_proveedores,'')+'</select></div></div>'+
    '<div class="fg4" style="margin-top:10px"><div class="f"><label>USD FOB</label><input type="number" id="cxFob" placeholder="0.00" step="0.01" min="0" oninput="calcComex()"/></div><div class="f"><label>% Nac.</label><input type="number" id="cxPct" placeholder="0.00" step="0.01" min="0" max="100" oninput="calcComex()"/></div><div class="f"><label>USD Nac.</label><input type="number" id="cxNac" readonly style="color:var(--cyan)"/></div><div class="f"><label>T.Cambio</label><input type="number" id="cxTC" placeholder="0.00" step="0.01" min="0" oninput="calcComex()"/></div></div>'+
    '<div class="fg2" style="margin-top:10px"><div class="f"><label>Importe ARS</label><input type="number" id="cxTotal" readonly style="color:var(--yellow)"/></div><div class="f"><label>Archivo/Drive</label><input type="text" id="cxArch" placeholder="https://drive.google.com/..."/></div></div>'+
    '<div class="factions"><button class="btn bp" onclick="addComex()">Registrar</button></div></div>';
  return form+'<div class="twrap"><div class="thead2"><h3>COMEX — '+proy.nombre+'</h3><span style="font-size:12px;color:var(--text2)">'+fil.length+' registros</span></div><div style="overflow-x:auto"><table style="min-width:1000px"><thead><tr><th>Fecha</th><th>Tipo</th><th>Pedido</th><th>Proveedor</th><th>USD FOB</th><th>% Nac.</th><th>USD Nac.</th><th>T.Cambio</th><th>Total ARS</th><th>Archivo</th>'+(!ro?'<th></th>':'')+'</tr></thead><tbody>'+(rows||'<tr><td colspan="'+(ro?10:11)+'" style="text-align:center;color:var(--text2);padding:14px">Sin operaciones</td></tr>')+'</tbody></table></div></div>';
}
function calcComex(){var fob=parseFloat(document.getElementById('cxFob').value)||0,pct=parseFloat(document.getElementById('cxPct').value)||0,tc=parseFloat(document.getElementById('cxTC').value)||0,tipo=document.getElementById('cxTipo').value,nac=fob*pct/100;document.getElementById('cxNac').value=nac.toFixed(2);document.getElementById('cxTotal').value=(tipo==='Nacionalización'?nac*tc:fob*tc).toFixed(2);}
function addComex(){var f=document.getElementById('cxF').value,tipo=document.getElementById('cxTipo').value,ped=document.getElementById('cxPed').value.trim();if(!f||!tipo||!ped){alert('Completá fecha, tipo y pedido.');return;}sbPost('comex',{fecha_inicio:f,tipo_op:tipo,pedido:ped,proveedor:document.getElementById('cxProv').value,usd_fob:parseFloat(document.getElementById('cxFob').value)||0,pct_nac:parseFloat(document.getElementById('cxPct').value)||0,tipo_cambio:parseFloat(document.getElementById('cxTC').value)||0,archivo:document.getElementById('cxArch').value.trim()||null,proyecto_id:selProyId}).then(function(){proyTab='comex';reload('proyectos');});}
function delComex(id){if(!confirm('¿Eliminar?'))return;sbDelete('comex',id).then(function(){proyTab='comex';reload('proyectos');});}
function renderProyIngresos(proy,ro){
  var fil=C.proy_ingresos.filter(function(r){return r.proyecto_id===proy.id;});
  var rows='',tot=0;
  fil.forEach(function(r){tot+=parseFloat(r.monto)||0;rows+='<tr><td>'+r.item+'</td><td>'+fmtD(r.fecha_facturacion)+'</td><td class="green">'+fmt(r.monto)+'</td><td>'+r.cliente+'</td><td>'+(r.url?'<a href="'+r.url+'" target="_blank" style="color:var(--cyan);font-size:11px">🔗 Ver</a>':'-')+'</td>'+(!ro?'<td><button class="btn sm bd" onclick="delProyIng('+r.id+')">✕</button></td>':'')+'</tr>';});
  var byMes={};fil.forEach(function(r){var m=r.fecha_facturacion?r.fecha_facturacion.substring(0,7):'';if(!m)return;byMes[m]=(byMes[m]||0)+(parseFloat(r.monto)||0);});
  var mesRows='';Object.keys(byMes).sort().forEach(function(m){mesRows+='<tr><td>'+mesLabel(m+'-01')+'</td><td class="green">'+fmt(byMes[m])+'</td></tr>';});
  var form=ro?'':'<div class="panel"><h3>Registrar Ingreso — '+proy.nombre+'</h3>'+
    '<div class="fg4"><div class="f"><label>Item</label><input type="number" id="piItem" value="'+(fil.length+1)+'" readonly style="color:var(--cyan)"/></div><div class="f"><label>Fecha Facturación</label><input type="date" id="piF" value="'+hoy()+'"/></div><div class="f"><label>Monto USD</label><input type="number" id="piM" placeholder="0.00" step="0.01" min="0"/></div><div class="f"><label>Cliente</label><input type="text" id="piCli"/></div></div>'+
    '<div class="fg2" style="margin-top:10px"><div class="f"><label>URL/Adjunto</label><input type="text" id="piUrl" placeholder="https://..."/></div></div>'+
    '<div class="factions"><button class="btn bp" onclick="addProyIng()">Registrar</button></div></div>';
  return form+'<div style="display:grid;grid-template-columns:1fr 240px;gap:14px">'+
    '<div class="twrap"><div class="thead2"><h3>Ingresos — '+proy.nombre+'</h3><span style="font-size:12px;color:var(--text2)">Total: <strong class="green">'+fmt(tot)+'</strong></span></div><table><thead><tr><th>#</th><th>Fecha</th><th>Monto</th><th>Cliente</th><th>Doc.</th>'+(!ro?'<th></th>':'')+'</tr></thead><tbody>'+(rows||'<tr><td colspan="'+(ro?5:6)+'" style="text-align:center;color:var(--text2);padding:14px">Sin ingresos</td></tr>')+'<tr class="trow"><td colspan="2">TOTAL</td><td class="green">'+fmt(tot)+'</td><td colspan="'+(ro?2:3)+'"></td></tr></tbody></table></div>'+
    '<div class="twrap"><div class="thead2"><h3>Por Mes</h3></div><table><thead><tr><th>Mes</th><th>Total</th></tr></thead><tbody>'+(mesRows||'<tr><td colspan="2" style="text-align:center;color:var(--text2);padding:12px">Sin datos</td></tr>')+'</tbody></table></div></div>';
}
function addProyIng(){var f=document.getElementById('piF').value,m=parseFloat(document.getElementById('piM').value),cli=document.getElementById('piCli').value.trim();if(!f||isNaN(m)||m<=0||!cli){alert('Completá fecha, monto y cliente.');return;}var fil=C.proy_ingresos.filter(function(r){return r.proyecto_id===selProyId;});sbPost('proy_ingresos',{item:fil.length+1,fecha_facturacion:f,monto:m,cliente:cli,url:document.getElementById('piUrl').value,proyecto_id:selProyId}).then(function(){proyTab='ingresos';reload('proyectos');});}
function delProyIng(id){if(!confirm('¿Eliminar?'))return;sbDelete('proy_ingresos',id).then(function(){proyTab='ingresos';reload('proyectos');});}
function renderProyGastos(proy,ro){
  var fil=C.proy_gastos.filter(function(r){return r.proyecto_id===proy.id;});
  var rows='',tot=0;
  fil.forEach(function(r){tot+=parseFloat(r.importe)||0;rows+='<tr><td>'+r.item+'</td><td>'+fmtD(r.fecha)+'</td><td>'+r.concepto+'</td><td class="red">'+fmt(r.importe)+'</td><td><span class="badge '+(r.estado==='Pagado'?'bg':'by')+'">'+r.estado+'</span></td><td>'+r.quien_pago+'</td>'+(!ro?'<td><button class="btn sm bd" onclick="delProyGas('+r.id+')">✕</button></td>':'')+'</tr>';});
  var form=ro?'':'<div class="panel"><h3>Registrar Gasto — '+proy.nombre+'</h3>'+
    '<div class="fg4"><div class="f"><label>Item</label><input type="number" id="pgItem" value="'+(fil.length+1)+'" readonly style="color:var(--cyan)"/></div><div class="f"><label>Fecha</label><input type="date" id="pgF" value="'+hoy()+'"/></div><div class="f"><label>Concepto</label><select id="pgCon">'+listOpts(C.cfg_conceptos_gasto,'')+'</select></div><div class="f"><label>Importe USD</label><input type="number" id="pgImp" placeholder="0.00" step="0.01" min="0"/></div></div>'+
    '<div class="fg3" style="margin-top:10px"><div class="f"><label>Estado</label><select id="pgEst">'+listOpts(C.cfg_estados_gasto,'')+'</select></div><div class="f"><label>Quien Pagó</label><select id="pgQP">'+listOpts(C.cfg_quien_pago,'')+'</select></div></div>'+
    '<div class="factions"><button class="btn bp" onclick="addProyGas()">Registrar</button></div></div>';
  return form+'<div class="twrap"><div class="thead2"><h3>Gastos — '+proy.nombre+'</h3><span style="font-size:12px;color:var(--text2)">Total: <strong class="red">'+fmt(tot)+'</strong></span></div><table><thead><tr><th>#</th><th>Fecha</th><th>Concepto</th><th>Importe</th><th>Estado</th><th>Quien Pagó</th>'+(!ro?'<th></th>':'')+'</tr></thead><tbody>'+(rows||'<tr><td colspan="'+(ro?6:7)+'" style="text-align:center;color:var(--text2);padding:14px">Sin gastos</td></tr>')+'<tr class="trow"><td colspan="3">TOTAL</td><td class="red">'+fmt(tot)+'</td><td colspan="'+(ro?2:3)+'"></td></tr></tbody></table></div>';
}
function addProyGas(){var f=document.getElementById('pgF').value,imp=parseFloat(document.getElementById('pgImp').value);if(!f||isNaN(imp)||imp<=0){alert('Completá fecha e importe.');return;}var fil=C.proy_gastos.filter(function(r){return r.proyecto_id===selProyId;});sbPost('proy_gastos',{item:fil.length+1,fecha:f,concepto:document.getElementById('pgCon').value,importe:imp,estado:document.getElementById('pgEst').value,quien_pago:document.getElementById('pgQP').value,proyecto_id:selProyId}).then(function(){proyTab='gastos';reload('proyectos');});}
function delProyGas(id){if(!confirm('¿Eliminar?'))return;sbDelete('proy_gastos',id).then(function(){proyTab='gastos';reload('proyectos');});}

// ===== CONFIG =====
function pgConfig(){
  function secCfg(label,key,color){var items=C[key];var rows=items.map(function(v,i){return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="badge '+(color||'bb')+'" style="flex:1">'+v+'</span><button class="btn sm bd" onclick="removeCfg(\''+key+'\','+i+')">✕</button></div>';}).join('');return'<div class="panel"><h3>'+label+'</h3>'+rows+'<div style="display:flex;gap:8px;margin-top:8px"><input type="text" id="cfgInp_'+key+'" placeholder="Nuevo valor..." style="flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:7px;font-size:12px;outline:none"/><button class="btn bp sm" onclick="addCfg(\''+key+'\')">+ Agregar</button></div></div>';}
  return '<div class="pageTitle">Configuración</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div>'+secCfg('Categorías de Asientos','cfg_cat_asientos','bb')+secCfg('Proveedores COMEX','cfg_proveedores','by')+secCfg('Tipos de Operación COMEX','cfg_tipo_op','bb')+'</div><div>'+secCfg('Conceptos de Gasto','cfg_conceptos_gasto','br')+secCfg('Estados de Gasto','cfg_estados_gasto','by')+secCfg('Quien Pagó','cfg_quien_pago','bg')+'</div></div>';
}
function addCfg(key){var inp=document.getElementById('cfgInp_'+key),val=inp.value.trim();if(!val){alert('Ingresá un valor.');return;}if(C[key].indexOf(val)>-1){alert('Ya existe.');return;}C[key].push(val);saveCfg();go('config');}
function removeCfg(key,idx){if(!confirm('¿Eliminar "'+C[key][idx]+'"?'))return;C[key].splice(idx,1);saveCfg();go('config');}

// ===== USUARIOS =====
function pgUsuarios(){
  var rows='';USERS.forEach(function(u){rows+='<tr><td style="font-family:monospace">'+u.u+'</td><td>'+u.name+'</td><td><span class="badge '+(u.role==='admin'?'bb':'by')+'">'+(u.role==='admin'?'Admin':'Lectura')+'</span></td><td style="font-family:monospace;color:var(--text2)">'+u.p+'</td></tr>';});
  return '<div class="pageTitle">Usuarios</div><div class="twrap"><div class="thead2"><h3>Usuarios del Sistema</h3></div><table><thead><tr><th>Usuario</th><th>Nombre</th><th>Rol</th><th>Contraseña</th></tr></thead><tbody>'+rows+'</tbody></table></div><div class="alert ainfo">Datos guardados en Supabase — compartidos en tiempo real.</div>';
}
</script>
